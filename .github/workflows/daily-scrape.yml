name: daily-scrape

# Zweck: testen, ob der GRATIS-Airbnb-Scrape aus der GitHub-Cloud (Rechenzentrums-IP)
# funktioniert -> dann kann der Tageslauf OHNE Adrians Rechner laufen.
# Vorerst nur manuell (workflow_dispatch). Wenn der Test zeigt dass Airbnb die Cloud-IP
# bedient, wird der schedule-Block aktiviert.

on:
  workflow_dispatch:
  schedule:
    # 02:23 UTC = 04:23 CH. BEWUSST ungerade Minute + frueh: GitHubs Gratis-Scheduler
    # verzoegert Schedules massiv (volle Stunde = ueberlastetster Slot; Beleg: refresh-data
    # lief am 05.06. 10h zu spaet). Off-Peak + Puffer -> Lauf (~25min) sollte vor 06:00 CH
    # fertig sein. GitHub-Cron bleibt best-effort; bei erneutem Ausfall externer Trigger.
    - cron: '23 2 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fokus-Maerkte gratis scrapen (Cloud-IP-Test)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          while IFS= read -r m; do
            [ -z "$m" ] && continue
            case "$m" in \#*) continue ;; esac
            echo "==================== $m ===================="
            python tools/ensure_center.py "$m" || true
            python tools/fetch_airbnb_free.py "$m, Switzerland" --market "$m" || true
            python tools/pdp_enrich.py "$m" || true
            python tools/compdata.py "$m" || true
            sleep 5
          done < tools/cockpit_communes.txt
          python tools/build_market_manifest.py || true
          python tools/build_host_portfolios.py || true
          python tools/build_operator_network.py || true
          python tools/log_reviews.py || true
          # Pickup (echte Buchungen seit letztem Snapshot) -> speist die "Bewegung" im Briefing.
          python tools/pickup.py --all --json || true
          # Morgen-Briefing destillieren (Neustarter / stille Perlen / Top-Verdiener / Bewegung).
          python tools/briefing.py || true

      - name: Cloud-Test-Marker schreiben (zeigt ob Airbnb die GitHub-IP bedient)
        if: always()
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python - <<'PY'
          import json, os, datetime
          comp = {}
          p = "data/airbnb-competitors.json"
          if os.path.exists(p):
              comp = json.load(open(p, encoding="utf-8"))
          rows = []
          for name in ["Kriens", "Emmen", "Horw", "Ebikon", "Baden", "Meggen"]:
              e = comp.get(name) or {}
              rows.append({"market": name, "count": e.get("count"), "geo": e.get("geo"),
                           "scrape_run": (e.get("scrape_run") or {}).get("date") if isinstance(e.get("scrape_run"), dict) else None})
          out = {"runner": "github-actions (datacenter IP)",
                 "utc": datetime.datetime.utcnow().isoformat(timespec="seconds"),
                 "verdict": "OK wenn count>0 fuer mehrere Maerkte; sonst Airbnb blockt Cloud-IP",
                 "markets": rows}
          json.dump(out, open("data/cloud-scrape-test.json", "w", encoding="utf-8"), ensure_ascii=False, indent=2)
          print(json.dumps(out, ensure_ascii=False, indent=2))
          PY

      - name: Daten zurueck committen
        if: always()
        run: |
          git config user.name "swissstr-cloud-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "Cloud-Scrape $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]" || { echo "nichts zu committen"; exit 0; }
          # Pull-Rebase vor Push (falls parallel auf main committet wurde), mit Retry.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && { echo "gepusht"; break; } || { echo "Push-Versuch $i fehlgeschlagen, retry ..."; sleep 5; }
          done
